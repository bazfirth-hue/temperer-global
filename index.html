<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Elite security consultancy drawn from specialist military units, counter-terrorism command, and national crisis response. Protecting critical infrastructure, major venues, and high-value assets worldwide." />
  <title>Temperer Global — Elite Security Consultancy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400&display=swap" rel="stylesheet">
  
  <style>
    /* ── TIER-1 CINEMATIC SPLASH CONTAINER ────────────────── */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: radial-gradient(circle at center, #0e1a30 0%, #060b14 100%); /* Deep vignette core */
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      opacity: 1;
      visibility: visible;
      /* Premium, ultra-smooth exit curve */
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), 
                  visibility 0.8s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 1.1s cubic-bezier(0.85, 0, 0.15, 1);
    }

    .splash-content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      will-change: transform, opacity;
    }

    /* ── THE FROG CREST: VOLUMETRIC GLOW ─────────────────── */
    .splash-logo {
      width: 160px;
      height: auto;
      opacity: 0;
      transform: scale(0.9) translateY(15px);
      filter: drop-shadow(0 0 0px rgba(212, 175, 55, 0)) brightness(0.4);
      /* Triggers hardware acceleration for perfect framerates */
      will-change: transform, opacity, filter; 
      animation: tier1LogoReveal 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.2s;
    }

    /* ── MASKED TEXT REVEAL ─────────────────────────────── */
    .splash-text-wrap {
      overflow: hidden; /* Acts as an invisible horizon line */
      margin-top: 20px;
      padding: 5px 10px;
    }

    .splash-title {
      color: #FFFFFF;
      font-family: 'Inter', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.5rem;
      margin: 0;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(100%); /* Hidden below the mask line */
      animation: tier1TextReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards 1.1s;
    }

    .splash-subtitle {
      color: #D4AF37; /* Pure Gold Accent */
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.3rem;
      text-transform: uppercase;
      margin-top: 8px;
      opacity: 0;
      animation: tier1FadeIn 1s ease forwards 1.6s;
    }

    /* ── CINEMATIC KEYFRAMES ────────────────────────────── */
    @keyframes tier1LogoReveal {
      0% {
        opacity: 0;
        transform: scale(0.9) translateY(20px);
        filter: drop-shadow(0 0 0px rgba(212, 175, 55, 0)) brightness(0.3);
      }
      50% {
        opacity: 0.7;
        filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.3)) brightness(1.2); /* Peak highlight flare */
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.1)) brightness(1);
      }
    }

    @keyframes tier1TextReveal {
      0% {
        opacity: 0;
        transform: translateY(100%);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes tier1FadeIn {
      to { opacity: 1; }
    }

    /* ── THE DISMISSAL (VIGNETTE SHUTTER) ───────────────── */
    #splash-screen.fade-out {
      opacity: 0;
      visibility: hidden;
      transform: scale(1.05); /* Slight camera-zoom out effect as it vanishes */
    }
  </style>

  <style>
    /* ── RESET ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0B1325;
      --bg-raised:   #0E1930;
      --bg-card:     #111E38;
      --white:       #F8F9FA;
      --slate:       #94A3B8;
      --muted:       #64748B;
      --gold:        #C5A880;
      --gold-faint:  rgba(197, 168, 128, 0.07);
      --gold-dim:    rgba(197, 168, 128, 0.20);
      --gold-mid:    rgba(197, 168, 128, 0.38);
      --border:        rgba(255, 255, 255, 0.07);
      --border-raised: rgba(255, 255, 255, 0.11);
      --font: 'Inter', 'Helvetica Neue', Helvetica,
              -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --nav-h:  72px;
      --pad:    140px;
      --max:    1200px;
      --t:      0.26s ease;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--slate);
      font-family: var(--font);
      font-size: 18px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    img { display: block; max-width: 100%; }
    a   { color: inherit; text-decoration: none; }
    ul  { list-style: none; }

    /* ── LAYOUT UTILITIES ──────────────────────────── */
    .container {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 48px;
    }

    .gold-rule {
      width: 44px;
      height: 1px;
      background: var(--gold);
      opacity: 0.50;
      margin-bottom: 28px;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(2.1rem, 5vw, 3.1rem);
      font-weight: 800;
      line-height: 1.06;
      letter-spacing: -0.015em;
      color: var(--white);
      margin-bottom: 18px;
    }

    /* ── SCROLL REVEAL ─────────────────────────────── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.85s ease, transform 0.85s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── BUTTONS ───────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 15px 32px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 2px;
      border: none;
      cursor: pointer;
      transition: all var(--t);
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--gold);
      color: #0B1325;
    }
    .btn-primary:hover {
      background: #d4ba98;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.40);
    }

    .btn-outline {
      background: transparent;
      color: var(--white);
      border: 1px solid rgba(255, 255, 255, 0.20);
    }
    .btn-outline:hover {
      border-color: var(--gold-mid);
      color: var(--gold);
      transform: translateY(-1px);
    }

    .btn-sm { padding: 10px 22px; font-size: 11px; }

    /* ── NAVIGATION ────────────────────────────────── */
    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      height: var(--nav-h);
      transition: background var(--t), border-color var(--t);
      border-bottom: 1px solid transparent;
    }
    #navbar.scrolled {
      background: rgba(11, 19, 37, 0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom-color: var(--border);
    }

    .nav-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 48px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--white);
      flex-shrink: 0;
    }
    .nav-logo em { font-style: normal; color: var(--gold); }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 40px;
    }
    .nav-links a {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--slate);
      transition: color var(--t);
    }
    .nav-links a:hover { color: var(--white); }

    .nav-cta {
      padding: 9px 20px;
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      border-radius: 2px;
      transition: all var(--t);
      white-space: nowrap;
    }
    .nav-cta:hover {
      background: var(--gold);
      color: #0B1325;
      border-color: var(--gold);
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--white);
      transition: transform var(--t), opacity var(--t);
    }
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* ── HERO ──────────────────────────────────────── */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: var(--bg);
    }
    .hero-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 75% at 85% 50%,  rgba(14, 25, 50, 0.75) 0%, transparent 60%),
        radial-gradient(ellipse 35% 50% at 0%  100%, rgba(197, 168, 128, 0.03) 0%, transparent 522%);
    }

    .hero-img-zone {
      position: absolute;
      top: 0; right: 0;
      width: 42%;
      height: 100%;
      pointer-events: none;
    }
    .hero-img-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, var(--bg) 0%, transparent 42%);
      z-index: 1;
    }
    .hero-img-slot {
      width: 100%;
      height: 100%;
      background: var(--bg-card);
      border-left: 1px solid var(--border-raised);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      color: rgba(148, 163, 184, 0.15);
      text-transform: uppercase;
      text-align: center;
      line-height: 2.8;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: var(--max);
      margin: 0 auto;
      padding: calc(var(--nav-h) + 84px) 48px 120px;
    }
    .hero-content { max-width: 600px; }

    .hero-eyebrow {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 32px;
    }
    .hero-eyebrow::before {
      content: '';
      width: 32px;
      height: 1px;
      background: var(--gold);
      opacity: 0.55;
      flex-shrink: 0;
    }

    .hero-headline {
      font-size: clamp(3rem, 7.5vw, 5.8rem);
      font-weight: 800;
      line-height: 1.0;
      letter-spacing: -0.025em;
      color: var(--white);
      margin-bottom: 28px;
    }
    .hero-headline .accent { color: var(--gold); }

    .hero-sub {
      font-size: 18px;
      font-weight: 400;
      color: var(--slate);
      line-height: 1.75;
      max-width: 500px;
      margin-bottom: 36px;
    }

    .hero-divider {
      width: 44px;
      height: 1px;
      background: var(--gold);
      opacity: 0.40;
      margin-bottom: 24px;
    }

    .hero-credentials {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }
    .hero-credentials span {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--muted);
      padding: 4px 20px;
      border-right: 1px solid rgba
