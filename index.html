<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Elite security consultancy drawn from specialist military units, counter-terrorism command, and national crisis response. Protecting critical infrastructure, major venues, and high-value assets worldwide." />
  <title>Temperer Global — Elite Security Consultancy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400&display=swap" rel="stylesheet">
  
  <style>
    /* ── TIER-1 CINEMATIC SPLASH CONTAINER ────────────────── */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: radial-gradient(circle at center, #0e1a30 0%, #060b14 100%); /* Deep vignette core */
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      opacity: 1;
      visibility: visible;
      /* Premium, ultra-smooth exit curve */
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), 
                  visibility 0.8s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 1.1s cubic-bezier(0.85, 0, 0.15, 1);
    }

    .splash-content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      will-change: transform, opacity;
    }

    /* ── THE FROG CREST: VOLUMETRIC GLOW ─────────────────── */
    .splash-logo {
      width: 160px;
      height: auto;
      opacity: 0;
      transform: scale(0.9) translateY(15px);
      filter: drop-shadow(0 0 0px rgba(212, 175, 55, 0)) brightness(0.4);
      /* Triggers hardware acceleration for perfect framerates */
      will-change: transform, opacity, filter; 
      animation: tier1LogoReveal 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.2s;
    }

    /* ── MASKED TEXT REVEAL ─────────────────────────────── */
    .splash-text-wrap {
      overflow: hidden; /* Acts as an invisible horizon line */
      margin-top: 20px;
      padding: 5px 10px;
    }

    .splash-title {
      color: #FFFFFF;
      font-family: 'Inter', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.5rem;
      margin: 0;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(100%); /* Hidden below the mask line */
      animation: tier1TextReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards 1.1s;
    }

    .splash-subtitle {
      color: #D4AF37; /* Pure Gold Accent */
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.3rem;
      text-transform: uppercase;
      margin-top: 8px;
      opacity: 0;
      animation: tier1FadeIn 1s ease forwards 1.6s;
    }

    /* ── CINEMATIC KEYFRAMES ────────────────────────────── */
    @keyframes tier1LogoReveal {
      0% {
        opacity: 0;
        transform: scale(0.9) translateY(20px);
        filter: drop-shadow(0 0 0px rgba(212, 175, 55, 0)) brightness(0.3);
      }
      50% {
        opacity: 0.7;
        filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.3)) brightness(1.2); /* Peak highlight flare */
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.1)) brightness(1);
      }
    }

    @keyframes tier1TextReveal {
      0% {
        opacity: 0;
        transform: translateY(100%);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes tier1FadeIn {
      to { opacity: 1; }
    }

    /* ── THE DISMISSAL (VIGNETTE SHUTTER) ───────────────── */
    #splash-screen.fade-out {
      opacity: 0;
      visibility: hidden;
      transform: scale(1.05); /* Slight camera-zoom out effect as it vanishes */
    }
  </style>

  <style>
    /* ── RESET ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0B1325;
      --bg-raised:   #0E1930;
      --bg-card:     #111E38;
      --white:       #F8F9FA;
      --slate:       #94A3B8;
      --muted:       #64748B;
      --gold:        #C5A880;
      --gold-faint:  rgba(197, 168, 128, 0.07);
      --gold-dim:    rgba(197, 168, 128, 0.20);
      --gold-mid:    rgba(197, 168, 128, 0.38);
      --border:        rgba(255, 255, 255, 0.07);
      --border-raised: rgba(255, 255, 255, 0.11);
      --font: 'Inter', 'Helvetica Neue', Helvetica,
              -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --nav-h:  72px;
      --pad:    140px;
      --max:    1200px;
      --t:      0.26s ease;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--slate);
      font-family: var(--font);
      font-size: 18px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    img { display: block; max-width: 100%; }
    a   { color: inherit; text-decoration: none; }
    ul  { list-style: none; }

    /* ── LAYOUT UTILITIES ──────────────────────────── */
    .container {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 48px;
    }

    .gold-rule {
      width: 44px;
      height: 1px;
      background: var(--gold);
      opacity: 0.50;
      margin-bottom: 28px;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(2.1rem, 5vw, 3.1rem);
      font-weight: 800;
      line-height: 1.06;
      letter-spacing: -0.015em;
      color: var(--white);
      margin-bottom: 18px;
    }

    /* ── SCROLL REVEAL ─────────────────────────────── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.85s ease, transform 0.85s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── BUTTONS ───────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 15px 32px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 2px;
      border: none;
      cursor: pointer;
      transition: all var(--t);
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--gold);
      color: #0B1325;
    }
    .btn-primary:hover {
      background: #d4ba98;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.40);
    }

    .btn-outline {
      background: transparent;
      color: var(--white);
      border: 1px solid rgba(255, 255, 255, 0.20);
    }
    .btn-outline:hover {
      border-color: var(--gold-mid);
      color: var(--gold);
      transform: translateY(-1px);
    }

    .btn-sm { padding: 10px 22px; font-size: 11px; }

    /* ── NAVIGATION ────────────────────────────────── */
    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      height: var(--nav-h);
      transition: background var(--t), border-color var(--t);
      border-bottom: 1px solid transparent;
    }
    #navbar.scrolled {
      background: rgba(11, 19, 37, 0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom-color: var(--border);
    }

    .nav-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 48px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--white);
      flex-shrink: 0;
    }
    .nav-logo em { font-style: normal; color: var(--gold); }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 40px;
    }
    .nav-links a {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--slate);
      transition: color var(--t);
    }
    .nav-links a:hover { color: var(--white); }

    .nav-cta {
      padding: 9px 20px;
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      border-radius: 2px;
      transition: all var(--t);
      white-space: nowrap;
    }
    .nav-cta:hover {
      background: var(--gold);
      color: #0B1325;
      border-color: var(--gold);
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--white);
      transition: transform var(--t), opacity var(--t);
    }
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* ── HERO ──────────────────────────────────────── */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: var(--bg);
    }
    .hero-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 75% at 85% 50%,  rgba(14, 25, 50, 0.75) 0%, transparent 60%),
        radial-gradient(ellipse 35% 50% at 0%  100%, rgba(197, 168, 128, 0.03) 0%, transparent 522%);
    }

    .hero-img-zone {
      position: absolute;
      top: 0; right: 0;
      width: 42%;
      height: 100%;
      pointer-events: none;
    }
    .hero-img-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, var(--bg) 0%, transparent 42%);
      z-index: 1;
    }
    .hero-img-slot {
      width: 100%;
      height: 100%;
      background: var(--bg-card);
      border-left: 1px solid var(--border-raised);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      color: rgba(148, 163, 184, 0.15);
      text-transform: uppercase;
      text-align: center;
      line-height: 2.8;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: var(--max);
      margin: 0 auto;
      padding: calc(var(--nav-h) + 84px) 48px 120px;
    }
    .hero-content { max-width: 600px; }

    .hero-eyebrow {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 32px;
    }
    .hero-eyebrow::before {
      content: '';
      width: 32px;
      height: 1px;
      background: var(--gold);
      opacity: 0.55;
      flex-shrink: 0;
    }

    .hero-headline {
      font-size: clamp(3rem, 7.5vw, 5.8rem);
      font-weight: 800;
      line-height: 1.0;
      letter-spacing: -0.025em;
      color: var(--white);
      margin-bottom: 28px;
    }
    .hero-headline .accent { color: var(--gold); }

    .hero-sub {
      font-size: 18px;
      font-weight: 400;
      color: var(--slate);
      line-height: 1.75;
      max-width: 500px;
      margin-bottom: 36px;
    }

    .hero-divider {
      width: 44px;
      height: 1px;
      background: var(--gold);
      opacity: 0.40;
      margin-bottom: 24px;
    }

    .hero-credentials {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }
    .hero-credentials span {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--muted);
      padding: 4px 20px;
      border-right: 1px solid rgba(255, 255, 255, 0.09);
    }
    .hero-credentials span:first-child { padding-left: 0; }
    .hero-credentials span:last-child  { border-right: none; }

    .hero-ctas { display: flex; gap: 14px; flex-wrap: wrap; }

    .hero-availability {
      position: absolute;
      bottom: 36px;
      left: 48px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.70;
    }

    /* ── TRUSTED BY ────────────────────────────────── */
    #trusted-by {
      background: var(--bg-raised);
      padding: 64px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .trusted-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 56px;
      flex-wrap: wrap;
    }

    .logo-slot {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(248, 249, 250, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.07);
      padding: 14px 32px;
      transition: color var(--t), border-color var(--t);
      cursor: default;
    }
    .logo-slot:hover {
      color: rgba(197, 168, 128, 0.70);
      border-color: var(--gold-dim);
    }

    .trusted-bridge {
      margin-top: 40px;
      text-align: center;
      font-size: 16px;
      font-weight: 400;
      color: var(--muted);
      font-style: italic;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.75;
    }

    /* ── FOUR PILLARS ──────────────────────────────── */
    #pillars {
      padding: var(--pad) 0;
      background: var(--bg);
    }

    .pillars-head {
      text-align: center;
      margin-bottom: 72px;
    }
    .pillars-tagline {
      font-size: 17px;
      font-weight: 400;
      color: var(--muted);
      font-style: italic;
      margin-top: 12px;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }

    .pillars-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .pillar-card {
      position: relative;
      background: var(--bg);
      padding: 52px 32px 44px;
      transition: background var(--t);
    }
    .pillar-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--gold);
      opacity: 0;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.38s ease, opacity 0.38s ease;
      pointer-events: none;
    }
    .pillar-card:hover { background: var(--bg-raised); }
    .pillar-card:hover::before { opacity: 0.70; transform: scaleX(1); }

    .pillar-number {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .pillar-icon {
      width: 42px;
      height: 42px;
      color: var(--gold);
      margin-bottom: 28px;
      opacity: 0.70;
    }
    .pillar-name {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.3;
      color: var(--white);
      margin-bottom: 16px;
      min-height: 2.7em;
    }
    .pillar-hook {
      font-size: 15px;
      font-weight: 400;
      font-style: italic;
      color: var(--slate);
      line-height: 1.65;
      margin-bottom: 20px;
      padding-left: 16px;
      border-left: 2px solid var(--gold-dim);
    }
    .pillar-body {
      font-size: 15px;
      font-weight: 400;
      color: var(--slate);
      line-height: 1.80;
      margin-bottom: 24px;
    }
    .pillar-data { margin-bottom: 32px; }
    .pillar-data li {
      font-size: 15px;
      font-weight: 400;
      color: var(--slate);
      line-height: 1.70;
      padding: 13px 0 13px 20px;
      border-top: 1px solid var(--border);
      position: relative;
    }
    .pillar-data li::before {
      content: '◆';
      position: absolute;
      left: 0; top: 15px;
      color: var(--gold);
      opacity: 0.65;
      font-size: 7px;
    }

    /* ── PILLAR ACCORDION ──────────────────────────── */
    .pillar-toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: none;
      border: 1px solid var(--gold-dim);
      cursor: pointer;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      padding: 10px 18px;
      border-radius: 1px;
      opacity: 0.80;
      transition: opacity var(--t), background var(--t), border-color var(--t);
    }
    .pillar-toggle:hover,
    .pillar-toggle[aria-expanded="true"] {
      opacity: 1;
      background: var(--gold-faint);
      border-color: var(--gold-mid);
    }

    .toggle-arrow {
      width: 11px;
      height: 11px;
      flex-shrink: 0;
      transition: transform 0.32s ease;
    }
    .pillar-toggle[aria-expanded="true"] .toggle-arrow {
      transform: rotate(180deg);
    }

    .pillar-detail {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.46s ease;
    }
    .pillar-detail.open {
      grid-template-rows: 1fr;
    }
    .pillar-detail > div {
      overflow: hidden;
    }

    .pillar-detail-body {
      margin-top: 28px;
      padding: 24px 0 4px;
      border-top: 1px solid var(--gold-dim);
    }
    .pillar-detail-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.85;
      margin-bottom: 12px;
    }
    .pillar-detail-body p {
      font-size: 15px;
      font-weight: 400;
      color: var(--slate);
      line-height: 1.80;
      margin-bottom: 18px;
    }
    .pillar-detail-body ul {
      list-style: none;
      margin-bottom: 24px;
    }
    .pillar-detail-body ul li {
      font-size: 14px;
      font-weight: 400;
      color: var(--slate);
      line-height: 1.70;
      padding: 11px 0 11px 20px;
      border-top: 1px solid var(--border);
      position: relative;
    }
    .pillar-detail-body ul li::before {
      content: '◆';
      position: absolute;
      left: 0; top: 13px;
      color: var(--gold);
      opacity: 0.55;
      font-size: 6px;
    }
    .pillar-detail-cta {
      display: inline-flex;
      align-items: center;
      padding: 11px 22px;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: #0B1325;
      background: var(--gold);
      border-radius: 1px;
      margin-top: 8px;
      margin-bottom: 8px;
      transition: background var(--t), transform var(--t);
    }
    .pillar-detail-cta:hover {
      background: #d4ba98;
      transform: translateY(-1px);
    }

    .pillars-bottom {
      margin-top: 72px;
      text-align: center;
    }
    .pillars-bottom-label {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 24px;
      text-transform: uppercase;
    }

    /* ── MARTYN'S LAW ──────────────────────────────── */
    #martyn {
      padding: var(--pad) 0;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .martyn-intro {
      display: grid;
      grid-template-columns: 1fr 1.55fr;
      gap: 80px;
      align-items: start;
      margin-bottom: 72px;
    }

    .martyn-lede {
      font-size: 18px;
      font-weight: 400;
      color: var(--slate);
      line-height: 1.80;
    }

    .martyn-subtitle {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .martyn-features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      margin-bottom: 52px;
    }

    .martyn-feat {
      background: var(--bg-raised);
      padding: 40px 32px;
      transition: background var(--t);
    }
    .martyn-feat:hover { background: var(--bg); }

    .martyn-feat-tier {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--white);
      margin-bottom: 6px;
    }
    .martyn-feat-capacity {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.80;
      padding-bottom: 18px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--gold-dim);
    }
    .martyn-feat p {
      font-size: 15px;
      font-weight: 400;
      color: var(--slate);
      line-height: 1.75;
    }

    .martyn-cta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    /* ── TESTIMONIAL ───────────────────────────────── */
    #testimonial {
      padding: var(--pad) 0;
      background: var(--bg-raised);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    #testimonial::before {
      content: '\201C';
      position: absolute;
      font-size: clamp(16rem, 34vw, 30rem);
      font-weight: 800;
      line-height: 1;
      color: rgba(197, 168, 128, 0.038);
      top: -4rem;
      left: -2rem;
      pointer-events: none;
      user-select: none;
    }

    .testimonial-inner {
      max-width: 820px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .quote-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 48px;
    }

    .quote-mark {
      display: block;
      font-size: 88px;
      font-weight: 800;
      line-height: 0.72;
      color: var(--gold);
      opacity: 0.42;
      margin-bottom: 32px;
    }

    .quote-text {
      font-size: clamp(1.08rem, 2.2vw, 1.28rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.85;
      color: var(--white);
      margin-bottom: 48px;
    }

    .quote-divider {
      width: 44px;
      height: 1px;
      background: var(--gold);
      opacity: 0.42;
      margin: 0 auto 36px;
    }

    .quote-attribution {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .quote-portrait {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: 1px solid var(--gold-dim);
      background: var(--bg-card);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: rgba(197, 168, 128, 0.28);
      text-transform: uppercase;
      text-align: center;
      overflow: hidden;
    }
    .quote-portrait img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); }

    .quote-meta { text-align: left; }

    .quote-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--white);
      margin-bottom: 4px;
    }
    .quote-rank {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.85;
      margin-bottom: 2px;
    }
    .quote-org {
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
    }

    .secondary-quotes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 72px;
      padding-top: 56px;
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }
    .sec-quote {
      padding: 32px;
      border: 1px solid var(--border);
      background: var(--bg);
      transition: border-color var(--t);
    }
    .sec-quote:hover { border-color: var(--gold-dim); }
    .sec-quote p {
      font-size: 16px;
      font-weight: 300;
      font-style: italic;
      color: var(--slate);
      line-height: 1.75;
      margin-bottom: 20px;
    }
    .sec-quote-attr {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.80;
    }

    /* ── THE NAME ──────────────────────────────────── */
    #the-name {
      padding: var(--pad) 0;
      background: var(--bg);
    }

    .name-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 100px;
      align-items: center;
    }

    .name-text {
      border-left: 2px solid var(--gold-dim);
      padding-left: 44px;
    }

    .name-body {
      font-size: 17px;
      font-weight: 400;
      color: var(--slate);
      line-height: 1.85;
      margin-bottom: 22px;
    }
    .name-body strong { color: var(--white); font-weight: 600; }
    .name-body em    { color: var(--slate); font-style: italic; }

    .name-closer {
      margin-top: 40px;
      padding: 28px;
      border-left: 3px solid var(--gold);
      background: var(--gold-faint);
    }
    .name-closer p {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.6;
      color: var(--white);
      margin: 0;
    }

    .name-img {
      width: 100%;
      aspect-ratio: 4/5;
      background: var(--bg-raised);
      border: 1px solid var(--border-raised);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      color: rgba(148, 163, 184, 0.18);
      text-transform: uppercase;
      text-align: center;
      line-height: 2.8;
      position: relative;
      overflow: hidden;
      transition: border-color var(--t);
    }
    .name-img:hover { border-color: var(--gold-dim); }
    .name-img::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(197,168,128,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(197,168,128,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    .c {
      position: absolute;
      width: 16px; height: 16px;
      border-color: var(--gold-dim);
      border-style: solid;
    }
    .c-tl { top: 16px; left: 16px;  border-width: 1px 0 0 1px; }
    .c-tr { top: 16px; right: 16px; border-width: 1px 1px 0 0; }
    .c-bl { bottom: 16px; left: 16px;  border-width: 0 0 1px 1px; }
    .c-br { bottom: 16px; right: 16px; border-width: 0 1px 1px 0; }

    /* ── FINAL CTA ─────────────────────────────────── */
    #final-cta {
      padding: var(--pad) 0;
      background: var(--bg-raised);
      text-align: center;
      border-top: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    #final-cta::before {
      content: 'TEMPERER';
      position: absolute;
      font-size: clamp(5rem, 20vw, 16rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      color: rgba(197, 168, 128, 0.028);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
    }

    .final-inner {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
    }
    .final-inner .section-title { margin-bottom: 16px; }

    .final-sub {
      font-size: 18px;
      font-weight: 400;
      color: var(--slate);
      line-height: 1.75;
      margin-bottom: 52px;
    }
    .final-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    .final-contact {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .final-contact a {
      color: var(--gold);
      opacity: 0.85;
      transition: opacity var(--t), color var(--t);
    }
    .final-contact a:hover { opacity: 1; color: var(--white); }

    /* ── FOOTER ────────────────────────────────────── */
    #footer {
      padding: 44px 0;
      background: #060E1C;
      border-top: 1px solid var(--border);
    }
    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
    }
    .footer-logo {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .footer-logo em { font-style: normal; color: var(--gold); opacity: 0.75; }

    .footer-nav {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }
    .footer-nav a {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.65;
      transition: opacity var(--t), color var(--t);
    }
    .footer-nav a:hover { opacity: 1; color: var(--slate); }

    .footer-copy {
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      opacity: 0.45;
    }

    /* ── RESPONSIVE ────────────────────────────────── */
    @media (max-width: 1024px) {
      .pillars-grid    { grid-template-columns: repeat(2, 1fr); }
      .martyn-features { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 900px) {
      .name-grid        { grid-template-columns: 1fr; gap: 56px; }
      .secondary-quotes { grid-template-columns: 1fr; }
      .martyn-intro     { grid-template-columns: 1fr; gap: 32px; }
      .martyn-features  { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      :root { --pad: 90px; }
      .container,
      .nav-inner { padding: 0 24px; }

      .nav-links {
        display: none;
        position: absolute;
        top: var(--nav-h);
        left: 0; right: 0;
        background: rgba(11, 19, 37, 0.98);
        backdrop-filter: blur(20px);
        flex-direction: column;
        gap: 0;
        padding: 8px 0 24px;
        border-bottom: 1px solid var(--border);
      }
      .nav-links.open  { display: flex; }
      .nav-links a     { display: block; padding: 14px 32px; }
      .nav-cta         { display: none; }
      .hamburger       { display: flex; }

      .hero-inner        { padding: calc(var(--nav-h) + 60px) 24px 96px; }
      .hero-img-zone     { display: none; }
      .hero-content      { max-width: 100%; }
      .hero-availability { left: 24px; bottom: 24px; }

      .hero-credentials { flex-direction: column; align-items: flex-start; gap: 0; }
      .hero-credentials span {
        padding: 6px 0;
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,0.07);
      }
      .hero-credentials span:last-child { border-bottom: none; }
      .hero-ctas { flex-direction: column; align-items: flex-start; }

      .pillars-grid { grid-template-columns: 1fr; }
      .pillar-card  { padding: 40px 24px; }

      .martyn-feat  { padding: 32px 24px; }

      .testimonial-inner { text-align: left; }
      .quote-attribution { justify-content: flex-start; }
      .quote-meta        { text-align: left; }
      .quote-divider     { margin-left: 0; }

      .name-text { padding-left: 24px; }

      .footer-row { flex-direction: column; text-align: center; align-items: center; }
      .footer-nav { justify-content: center; }
    }

    @media (max-width: 480px) {
      .container { padding: 0 20px; }
    }
  </style>
</head>

<body>

  <div id="splash-screen">
    <div class="splash-content">
      <img src="assets/images/110616fa-689d-417c-af5b-388490147f13.webp" alt="Temperer Global Logo" class="splash-logo">
      <div class="splash-text-wrap">
        <h1 class="splash-title">TEMPERER GLOBAL</h1>
      </div>
      <p class="splash-subtitle">Elite Security Consultancy</p>
    </div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        if (splash) {
          splash.classList.add('fade-out');
        }
      }, 3200); // 3.2 Seconds for complete theatrical reveal cadence
    });
  </script>

</body>
</html>
